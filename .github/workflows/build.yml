name: Build and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: "23"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14"

      - name: Generate test structures
        run: python3 tools/generate_test_structures.py

      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace

      - name: Run GameTest Tests
        run: gradle runGameTest --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redscope-artifacts
          path: |
            build/libs/*.jar
            build/reports/
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redscope-test-results
          path: build/reports/tests/
          if-no-files-found: ignore