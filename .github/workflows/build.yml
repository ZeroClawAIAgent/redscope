name: Build and Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate test structures
        run: python3 tools/generate_test_structures.py

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run GameTest Tests
        run: ./gradlew runGameTest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redscope-artifacts
          path: |
            build/libs/*.jar
            build/reports/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: redscope-test-results
          path: build/reports/tests/
