plugins {
    id 'java'
    id 'net.fabricmc.fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}

version = '1.0.0'
group = 'com.redscope'

base {
    archivesName = 'redscope'
}

repositories {
    maven { url 'https://maven.fabricmc.net/' }
    maven { url 'https://maven.terraformersmc.com/' }
    maven { url 'https://maven.shedaniel.me/' }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:26.1.2"
    // No mappings for 26.1+ (unmapped)
    implementation "net.fabricmc:fabric-loader:0.19.2"
    implementation "net.fabricmc.fabric-api:fabric-api:0.148.0+26.1.2"

    // Cloth Config & ModMenu (optional client-side)
    modImplementation "com.terraformersmc:modmenu:14.0.0-beta.1"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:17.0.143"
}

processResources {
    inputs.property "version", version
    filesMatching("fabric.mod.json") {
        expand "version": version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

loom {
    runs {
        gameTest {
            inherit server
            name "Game Test"
            vmArg "-Dfabric-api.game-test"
            vmArg "-Dfabric-api.game-test-report-file=${project.buildDir}/junit.xml"
            runDir "build/gametest"
        }
    }
}

jar {
    from("LICENSE") {
        rename { String fileName -> "LICENSE_redscope" }
    }
}